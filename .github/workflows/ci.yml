name: CI Pipeline

on:
  push:
    branches: ["master"]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Debug user name
        run: echo "Username ${{ secrets.DOCKER_USERNAME }}"

      # Login Docker hub
      - name: Login Docker
        shell: cmd
        run: |
          set /p PASS=%DOCKER_PASSWORD%
          set /p USERNAME=%DOCKER_USERNAME%
          echo %PASS% | docker login -u %USERNAME% --password-stdin
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      # Build image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:latest .

      # Docker push image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-demo:latest
      
      # Setup Kubectl
      - name: Set up Kubectl
        uses: azure/setup-kubectl@v3

      # Deploy to kubernetes
      - name: Deploy
        run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
      # verify pods
      - name: verify
        run: kubectl get pods