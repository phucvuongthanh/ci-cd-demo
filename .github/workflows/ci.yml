name: CI Pipeline

on:
  push:
    branches: ["master"]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Debug user name
        run: echo "Username ${{ secrets.DOCKER_USERNAME }}"

      # # Login Docker hub
